<svg width="1100" height="300" viewBox="0 0 1100 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">tanbaycu signal panel</title>
  <desc id="desc">A custom signal panel showing tanbaycu identity, location, focus, and build mode.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1100" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020617"/>
      <stop offset="0.5" stop-color="#111827"/>
      <stop offset="1" stop-color="#07192F"/>
    </linearGradient>
    <linearGradient id="line" x1="80" y1="40" x2="1020" y2="260" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00F5A0"/>
      <stop offset="0.5" stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#00D9FF"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" stroke="#ffffff" stroke-opacity="0.055"/>
    </pattern>
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif; }
      @keyframes move { to { stroke-dashoffset: -220; } }
      @keyframes blink { 0%,100% { opacity: .35; } 50% { opacity: 1; } }
      .dash { stroke-dasharray: 18 12; animation: move 7s linear infinite; }
      .blink { animation: blink 2.2s ease-in-out infinite; }
    </style>
  </defs>

  <rect width="1100" height="300" rx="32" fill="url(#bg)"/>
  <rect width="1100" height="300" rx="32" fill="url(#grid)"/>
  <rect x="18" y="18" width="1064" height="264" rx="25" stroke="url(#line)" stroke-width="2.5"/>
  <path class="dash" d="M62 230C166 95 285 248 398 122C518 -11 642 258 760 111C863 -18 968 105 1040 55" stroke="url(#line)" stroke-width="2" opacity="0.75"/>

  <text x="58" y="72" class="mono" fill="#67E8F9" font-size="17" letter-spacing="5">SIGNAL / LIVE PROFILE</text>
  <text x="58" y="125" class="sans" fill="#FFFFFF" font-size="42" font-weight="900">not a resume. a launchpad.</text>
  <text x="60" y="162" class="mono" fill="#A7F3D0" font-size="18">Viet Nam, UTC+7 | building web craft, AI tools, automation, and portfolio-first experiments</text>

  <g transform="translate(60 202)">
    <rect width="200" height="46" rx="16" fill="#00F5A0"/>
    <text x="100" y="29" text-anchor="middle" class="mono" fill="#020617" font-size="14" font-weight="900">BUILD MODE</text>
  </g>
  <g transform="translate(280 202)">
    <rect width="220" height="46" rx="16" fill="#111827" stroke="#7C3AED"/>
    <text x="110" y="29" text-anchor="middle" class="mono" fill="#DDD6FE" font-size="14" font-weight="900">SHIP LOUDLY</text>
  </g>
  <g transform="translate(520 202)">
    <rect width="220" height="46" rx="16" fill="#111827" stroke="#00D9FF"/>
    <text x="110" y="29" text-anchor="middle" class="mono" fill="#BAE6FD" font-size="14" font-weight="900">POLISH HARD</text>
  </g>

  <g transform="translate(840 82)" filter="url(#glow)">
    <circle cx="90" cy="70" r="64" stroke="url(#line)" stroke-width="2" class="dash"/>
    <circle cx="90" cy="70" r="38" fill="#00D9FF" opacity="0.18"/>
    <circle cx="90" cy="70" r="16" fill="#00F5A0" class="blink"/>
    <text x="90" y="158" text-anchor="middle" class="mono" fill="#E0F2FE" font-size="13">SIGNAL ACTIVE</text>
  </g>
</svg>
